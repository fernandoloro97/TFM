name: Build and Push to ECR

on:
  push:
    branches:
      - main  # Se ejecuta al subir cambios a la rama principal

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: update_prices_volumes
        run: |
          # Construimos la imagen usando la ruta específica del Dockerfile
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
                       -f dockerfiles/prices_olumes/dockerfile .
          
          # Subimos la imagen a ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

