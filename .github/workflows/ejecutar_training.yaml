name: Executing Machine Learning Training Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  ejecutar-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Heavy AI and Data Dependencies
        run: |
          python -m pip install --upgrade pip
          # Instalamos PyTorch versión CPU para evitar descargas masivas de CUDA
          pip install torch --index-url https://pytorch.org --no-cache-dir
          
          # Instalamos el grueso de tus librerías de manipulación de datos e IA (sin groq)
          pip install pandas numpy boto3 requests rapidfuzz scikit-learn \
                      transformers sentence-transformers ctransformers spacy --no-cache-dir

      - name: Download NLP Models
        run: |
          # Descarga el modelo base de SpaCy por si tu script lo utiliza
          python -m spacy download en_core_web_sm

      - name: Run Training Input-Output Script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python src_training/analisis_hasta_inputs_outputs/analisis_hasta_inputs_outputs.py


